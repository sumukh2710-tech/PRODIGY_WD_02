<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Stopwatch</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#1d3557,#457b9d,#1d3557,#0f172a);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
color:white;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:420px;
padding:40px;
border-radius:30px;
background:#111827;
box-shadow:20px 20px 60px #0b0f1a,
           -20px -20px 60px #1a2438;
text-align:center;
}

h1{
font-weight:800;
margin-bottom:25px;
font-size:28px;
letter-spacing:1px;
}

.circle{
position:relative;
width:220px;
height:220px;
margin:0 auto 30px;
}

svg{
transform:rotate(-90deg);
}

circle{
fill:none;
stroke-width:12;
stroke-linecap:round;
}

.bg{
stroke:#1f2937;
}

.progress{
stroke:#00f5d4;
stroke-dasharray:628;
stroke-dashoffset:628;
transition:stroke-dashoffset 0.05s linear;
}

.time{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:24px;
font-weight:600;
}

.buttons{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:25px;
flex-wrap:wrap;
}

button{
padding:10px 18px;
border:none;
border-radius:50px;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

#mainBtn{
background:#00f5d4;
color:black;
}

#lapBtn{
background:#118ab2;
color:white;
}

#resetBtn{
background:#ef476f;
color:white;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
transform:none;
box-shadow:none;
}

.laps{
max-height:150px;
overflow-y:auto;
text-align:left;
}

.laps div{
padding:8px 12px;
background:#1f2937;
margin-bottom:8px;
border-radius:8px;
font-size:14px;
animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(5px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
<h1>Stopwatch</h1>

<div class="circle">
<svg width="220" height="220">
<circle class="bg" cx="110" cy="110" r="100"></circle>
<circle class="progress" cx="110" cy="110" r="100"></circle>
</svg>
<div class="time" id="display">00:00:00.00</div>
</div>

<div class="buttons">
<button id="mainBtn" onclick="toggle()">Start</button>
<button id="lapBtn" onclick="addLap()" disabled>Lap</button>
<button id="resetBtn" onclick="reset()">Reset</button>
</div>

<div class="laps" id="laps"></div>
</div>

<script>
let startTime = 0;
let elapsed = 0;
let timerInterval = null;
let running = false;
let lapCount = 0;

const display = document.getElementById("display");
const progressCircle = document.querySelector(".progress");
const mainBtn = document.getElementById("mainBtn");
const lapBtn = document.getElementById("lapBtn");
const circumference = 2 * Math.PI * 100;

progressCircle.style.strokeDasharray = circumference;

function formatTime(ms){
let milliseconds = Math.floor((ms % 1000) / 10);
let seconds = Math.floor((ms / 1000) % 60);
let minutes = Math.floor((ms / (1000*60)) % 60);
let hours = Math.floor(ms / (1000*60*60));

return String(hours).padStart(2,'0') + ":" +
       String(minutes).padStart(2,'0') + ":" +
       String(seconds).padStart(2,'0') + "." +
       String(milliseconds).padStart(2,'0');
}

function update(){
elapsed = Date.now() - startTime;
display.textContent = formatTime(elapsed);

let progress = (elapsed % 60000) / 60000;
progressCircle.style.strokeDashoffset = circumference - (progress * circumference);
}

function toggle(){
if(!running){
startTime = Date.now() - elapsed;
timerInterval = setInterval(update,10);
mainBtn.textContent = "Pause";
mainBtn.style.background="#ffd60a";
lapBtn.disabled = false;
running = true;
}else{
clearInterval(timerInterval);
mainBtn.textContent = "Start";
mainBtn.style.background="#00f5d4";
lapBtn.disabled = true;
running = false;
}
}

function reset(){
clearInterval(timerInterval);
elapsed = 0;
running = false;
lapCount = 0;
display.textContent = "00:00:00.00";
progressCircle.style.strokeDashoffset = circumference;
mainBtn.textContent = "Start";
mainBtn.style.background="#00f5d4";
lapBtn.disabled = true;
document.getElementById("laps").innerHTML="";
}

function addLap(){
if(!running) return;

lapCount++;

let lapDiv = document.createElement("div");
lapDiv.textContent = "Lap " + lapCount + " — " + formatTime(elapsed);
document.getElementById("laps").prepend(lapDiv);
}
</script>

</body>
</html>
